apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcp-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gcp-app
  template:
    metadata:
      labels:
        app: gcp-app
    spec:
      containers:
      - name: app
        image: asia-south2-docker.pkg.dev/my-project-new-490705/my-repo/app
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: gcp-service
spec:
  type: LoadBalancer
  selector:
    app: gcp-app
  ports:
    - port: 80
      targetPort: 3000
